apiVersion: apps/v1
kind: Deployment
metadata:
  name: archmind-frontend
  namespace: archmind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: archmind-frontend
  template:
    metadata:
      labels:
        app: archmind-frontend
    spec:
      containers:
      - name: archmind-frontend
        image: archmind/frontend:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
