apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: archmind-redis
  namespace: archmind
spec:
  serviceName: archmind-redis-svc
  replicas: 1
  selector:
    matchLabels:
      app: archmind-redis
  template:
    metadata:
      labels:
        app: archmind-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: archmind-redis-svc
  namespace: archmind
spec:
  clusterIP: None
  selector:
    app: archmind-redis
  ports:
  - port: 6379
    targetPort: 6379
