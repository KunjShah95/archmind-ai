            - generic [ref=f4e437]: How do the agents work?
            - img [ref=f4e439]
          - paragraph [ref=f4e440]: Each agent is a specialized LLM prompt tuned to a specific architectural concern — scalability, security, reliability, performance, cost, maintainability, and observability. They analyze your diagram in parallel, debate findings, and synthesize into actionable recommendations.
        - generic [ref=f4e441]:
          - button "Do I need to pay for LLM API costs?" [ref=f4e442] [cursor=pointer]:
            - generic [ref=f4e443]: Do I need to pay for LLM API costs?
            - img [ref=f4e445]
          - paragraph [ref=f4e446]: No. ArchMind supports free and open-source LLM providers. Run locally with Ollama, use Groq's free tier, or bring your own OpenAI-compatible endpoint. No credit card required.
        - generic [ref=f4e447]:
          - button "What diagram formats are supported?" [ref=f4e448] [cursor=pointer]:
            - generic [ref=f4e449]: What diagram formats are supported?
            - img [ref=f4e451]
          - paragraph [ref=f4e452]: Mermaid, PlantUML, Draw.io, Excalidraw, Lucidchart, Figma exports, PNG/JPG screenshots, and PDFs. We parse the structure and rebuild an interactive graph you can explore.
        - generic [ref=f4e453]:
          - button "Can I self-host ArchMind?" [ref=f4e454] [cursor=pointer]:
            - generic [ref=f4e455]: Can I self-host ArchMind?
            - img [ref=f4e457]
          - paragraph [ref=f4e458]: Yes. The entire stack is open-source friendly. Run the FastAPI backend + React frontend anywhere. Set OLLAMA_BASE_URL for fully offline operation.
        - generic [ref=f4e459]:
          - button "How accurate are the agent findings?" [ref=f4e460] [cursor=pointer]:
            - generic [ref=f4e461]: How accurate are the agent findings?
            - img [ref=f4e463]
          - paragraph [ref=f4e464]: Accuracy depends on the LLM provider. Local models provide solid general analysis. Cloud models offer deeper reasoning. All findings include specific, actionable recommendations — not generic advice.
        - generic [ref=f4e465]:
          - button "What about team collaboration?" [ref=f4e466] [cursor=pointer]:
            - generic [ref=f4e467]: What about team collaboration?
            - img [ref=f4e469]
