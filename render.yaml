services:
  - type: web
    name: archmind-api
    runtime: python
    repo: https://github.com/KunjShah95/archmind-ai
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && python -m alembic upgrade head
    startCommand: cd backend && python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT 2>&1
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://archmind-ai-nine.vercel.app,https://archmind-ai.vercel.app,http://localhost:8080
      - key: DEV_MODE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.8"
    domains:
      - archmind-api.onrender.com
