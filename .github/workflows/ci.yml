name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: pip install ruff && ruff check app/
      - name: Test + coverage
        run: python -m pytest tests/ --cov=app --cov-fail-under=80 -q
      - name: Docker build check
        run: docker build -t archmind-backend:ci .

  frontend:
    name: Frontend — lint + type-check + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
      - name: Type check
        run: npx tsc --noEmit --skipLibCheck
      - name: Unit tests (Vitest)
        run: npm run test -- --run
      - name: Build
        run: npm run build
      - name: Docker build check
        run: docker build -f frontend.Dockerfile -t archmind-frontend:ci .
