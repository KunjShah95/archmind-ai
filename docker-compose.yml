services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://archmind:archmind@db:5432/archmind
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DEV_MODE: "true"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: archmind
      POSTGRES_PASSWORD: archmind
      POSTGRES_DB: archmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archmind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
